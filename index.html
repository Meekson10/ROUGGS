<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROUGGS | Brutalist Edition</title>
    <style>
        /* --- BRUTALIST DARK MODE DESIGN SYSTEM --- */
        :root {
            --bg: #050505;
            --fg: #F4F4F0;
            --accent: #555555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-transform: uppercase;
            overflow-x: hidden;
        }

        button, a { cursor: pointer; font-family: inherit; }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 2px solid var(--fg);
            position: sticky;
            top: 0;
            background-color: var(--bg);
            z-index: 1000;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .nav-links { display: flex; gap: 2rem; align-items: center; font-weight: bold; font-size: 0.9rem; }
        .nav-links span { transition: color 0.2s; }
        .nav-links span:hover { color: var(--accent); }

        /* --- VIEW MANAGER --- */
        .view { display: none; padding: 2rem; min-height: 85vh; animation: flashIn 0.3s ease-out; }
        .view.active { display: block; }

        @keyframes flashIn {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
