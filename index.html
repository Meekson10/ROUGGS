<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROUGGS | Timeless Elegance</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- LUXURY COLOR PALETTE & TYPOGRAPHY --- */
        :root {
            --bg-primary: #1A1614; /* Deep Espresso / Soft Black */
            --bg-secondary: #24201E; /* Slightly lighter espresso */
            --text-light: #F4F0EC; /* Warm Alabaster */
            --text-muted: #A39B96; /* Taupe */
            --accent-gold: #B89B72; /* Muted Antique Gold */
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Lato', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-light);
            font-family: var(--font-sans);
            font-weight: 300;
            line-height: 1.6;
            overflow-x: hidden;
        }

        a, button { cursor: pointer; color: inherit; text-decoration: none; transition: 0.3s ease; }
        ul { list-style: none; }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(26, 22, 20, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(184, 155, 114, 0.1);
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            letter-spacing: 0.25em;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links span {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-light);
        }
        .nav-links span:hover, .nav-links span.active-link { color: var(--accent-gold); }

        .cart-icon { position: relative; }
        .cart-count {
            position: absolute; top: -10px; right: -15px;
            background: var(--accent-gold); color: var(--bg-primary);
            font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        /* --- VIEW MANAGER --- */
        .view-section {
            display: none;
            padding-top: 100px; /* Space for fixed header */
            min-height: 100vh;
            animation: fadeIn 0.8s ease forwards;
        }
        .view-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- UI COMPONENTS --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }
        
        .section-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--accent-gold);
        }

        .btn-primary {
            display: inline-block;
            padding: 1rem 3rem;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            background: transparent;
        }
        .btn-primary:hover { background: var(--accent-gold); color: var(--bg-primary); }

        /* --- HOME PAGE --- */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
            background: linear-gradient(rgba(26,22,20,0.4), rgba(26,22,20,0.8)), url('https://images.unsplash.com/photo-1571216300139-38c5b3644917?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover;
            margin-top: -100px; /* Overlap header */
        }
        .hero h1 {
            font-family: var(--font-serif); font-size: 4.5rem; font-style: italic;
